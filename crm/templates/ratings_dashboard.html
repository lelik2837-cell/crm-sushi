{% extends 'base.html' %}
{% block title %}Рейтинги{% endblock %}
{% block content %}

<div class="row g-3 mb-4">
  <div class="col-12">
    <div style="background:linear-gradient(135deg,#db2777 0%,#9333ea 55%,#7c3aed 100%); border-radius:20px; padding:28px 28px 24px; color:#fff;">

      <!-- Навигация: день / месяц -->
      <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:18px;">
        <div class="rat-nav" data-period="day" style="display:flex; align-items:center; gap:2px; background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.35); border-radius:20px; padding:3px;">
          <button onclick="shiftDay(-1)" title="Предыдущий день"
            style="width:24px; height:24px; border-radius:50%; border:none; background:transparent; color:#fff; cursor:pointer; font-size:14px; font-weight:700; line-height:1;">‹</button>
          <button onclick="selectPeriod('day')" id="rat-day-label"
            style="border:none; background:transparent; color:#fff; cursor:pointer; font-size:12px; font-weight:700; padding:4px 8px; letter-spacing:.2px; white-space:nowrap;">Сегодня</button>
          <button onclick="shiftDay(1)" id="rat-day-next" title="Следующий день"
            style="width:24px; height:24px; border-radius:50%; border:none; background:transparent; color:#fff; cursor:pointer; font-size:14px; font-weight:700; line-height:1;">›</button>
        </div>
        <div class="rat-nav" data-period="month" style="display:flex; align-items:center; gap:2px; background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.35); border-radius:20px; padding:3px;">
          <button onclick="shiftMonth(-1)" title="Предыдущий месяц"
            style="width:24px; height:24px; border-radius:50%; border:none; background:transparent; color:#fff; cursor:pointer; font-size:14px; font-weight:700; line-height:1;">‹</button>
          <button onclick="selectPeriod('month')" id="rat-month-label"
            style="border:none; background:transparent; color:#fff; cursor:pointer; font-size:12px; font-weight:700; padding:4px 8px; letter-spacing:.2px; white-space:nowrap;">Июль</button>
          <button onclick="shiftMonth(1)" id="rat-month-next" title="Следующий месяц"
            style="width:24px; height:24px; border-radius:50%; border:none; background:transparent; color:#fff; cursor:pointer; font-size:14px; font-weight:700; line-height:1;">›</button>
        </div>
      </div>

      <!-- Метрика -->
      <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px;">
        <button class="rat-metric-btn" data-rm="revenue" onclick="setMetric('revenue')"
          style="font-size:12px; padding:5px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.9); background:rgba(255,255,255,.25); color:#fff; cursor:pointer; font-weight:600; letter-spacing:.2px; transition:all .15s;">Выручка</button>
        <button class="rat-metric-btn" data-rm="fot_pct" onclick="setMetric('fot_pct')"
          style="font-size:12px; padding:5px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.35); background:rgba(255,255,255,.12); color:#fff; cursor:pointer; font-weight:600; letter-spacing:.2px; transition:all .15s;">ФОТ %</button>
        <button class="rat-metric-btn" data-rm="fot_rub" onclick="setMetric('fot_rub')"
          style="font-size:12px; padding:5px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.35); background:rgba(255,255,255,.12); color:#fff; cursor:pointer; font-weight:600; letter-spacing:.2px; transition:all .15s;">ФОТ ₽</button>
        <button class="rat-metric-btn" data-rm="pickup" onclick="setMetric('pickup')"
          style="font-size:12px; padding:5px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.35); background:rgba(255,255,255,.12); color:#fff; cursor:pointer; font-weight:600; letter-spacing:.2px; transition:all .15s;">Самовывоз</button>
        <button class="rat-metric-btn" data-rm="delivery" onclick="setMetric('delivery')"
          style="font-size:12px; padding:5px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.35); background:rgba(255,255,255,.12); color:#fff; cursor:pointer; font-weight:600; letter-spacing:.2px; transition:all .15s;">Доставка</button>
      </div>

      <div style="font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; opacity:.7; margin-bottom:16px;" id="ratings-title">
        Рейтинг филиалов — выручка
      </div>

      <div id="ratings-list">
        <div style="text-align:center; opacity:.6; padding:20px 0; font-size:13px;">Загрузка...</div>
      </div>

    </div>
  </div>
</div>

<script>
var currentPeriod = 'day';   // 'day' | 'month'
var currentMetric = 'revenue';
var dayDate   = new Date();
var monthDate = new Date();

var MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
var MONTHS_NOM = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

var METRICS = {
  revenue:  { label: 'выручка',    unit: '₽', get: function(b) { return b.revenue; } },
  fot_pct:  { label: 'ФОТ, %',     unit: '%', get: function(b) { return b.revenue > 0 ? (b.fot / b.revenue * 100) : 0; } },
  fot_rub:  { label: 'ФОТ, ₽',     unit: '₽', get: function(b) { return b.fot; } },
  pickup:   { label: 'самовывоз',  unit: '₽', get: function(b) { return b.pickup; } },
  delivery: { label: 'доставка',   unit: '₽', get: function(b) { return b.delivery_revenue; } }
};

function pad2(n) { return n < 10 ? '0' + n : String(n); }
function fmtDate(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
function fmtNum(n) { return Math.round(n).toLocaleString('ru-RU'); }
function isSameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function isSameMonth(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth(); }

function updateNavLabels() {
  var today = new Date();

  var dayLabel = document.getElementById('rat-day-label');
  dayLabel.textContent = isSameDay(dayDate, today) ? 'Сегодня' : (dayDate.getDate() + ' ' + MONTHS_GEN[dayDate.getMonth()]);
  document.getElementById('rat-day-next').disabled = isSameDay(dayDate, today);
  document.getElementById('rat-day-next').style.opacity = isSameDay(dayDate, today) ? '.35' : '1';

  var monthLabel = document.getElementById('rat-month-label');
  monthLabel.textContent = isSameMonth(monthDate, today) ? MONTHS_NOM[monthDate.getMonth()] : (MONTHS_NOM[monthDate.getMonth()] + ' ' + monthDate.getFullYear());
  document.getElementById('rat-month-next').disabled = isSameMonth(monthDate, today);
  document.getElementById('rat-month-next').style.opacity = isSameMonth(monthDate, today) ? '.35' : '1';

  document.querySelectorAll('.rat-nav').forEach(function(nav) {
    var active = nav.dataset.period === currentPeriod;
    nav.style.background = active ? 'rgba(255,255,255,.25)' : 'rgba(255,255,255,.12)';
    nav.style.borderColor = active ? 'rgba(255,255,255,.9)' : 'rgba(255,255,255,.35)';
  });
}

function selectPeriod(p) {
  currentPeriod = p;
  updateNavLabels();
  loadRatings();
}

function shiftDay(delta) {
  var d = new Date(dayDate);
  d.setDate(d.getDate() + delta);
  var today = new Date();
  if (d > today) d = today;
  dayDate = d;
  currentPeriod = 'day';
  updateNavLabels();
  loadRatings();
}

function shiftMonth(delta) {
  var d = new Date(monthDate);
  d.setMonth(d.getMonth() + delta, 1);
  var today = new Date();
  if (d.getFullYear() > today.getFullYear() || (d.getFullYear() === today.getFullYear() && d.getMonth() > today.getMonth())) {
    d = new Date(today.getFullYear(), today.getMonth(), 1);
  }
  monthDate = d;
  currentPeriod = 'month';
  updateNavLabels();
  loadRatings();
}

function updateTitle() {
  var metric = METRICS[currentMetric];
  var periodLabel;
  if (currentPeriod === 'day') {
    periodLabel = isSameDay(dayDate, new Date()) ? 'сегодня' : (dayDate.getDate() + ' ' + MONTHS_GEN[dayDate.getMonth()]);
  } else {
    periodLabel = MONTHS_NOM[monthDate.getMonth()].toLowerCase() + ' ' + monthDate.getFullYear();
  }
  document.getElementById('ratings-title').textContent = 'Рейтинг филиалов — ' + metric.label + ', ' + periodLabel;
}

// Медальные цвета для топ-3, остальные — обычный серый
var RANK_STYLES = [
  { badge: 'linear-gradient(135deg,#fde68a,#f59e0b)', badgeColor: '#78350f' }, // золото
  { badge: 'linear-gradient(135deg,#f1f5f9,#9ca3af)', badgeColor: '#374151' }, // серебро
  { badge: 'linear-gradient(135deg,#e0a458,#b5651d)', badgeColor: '#451a03' }  // бронза
];
var RANK_DEFAULT = { badge: 'rgba(255,255,255,.18)', badgeColor: '#fff' };

function fmtMetricValue(value, metric) {
  return metric.unit === '%'
    ? (Math.round(value * 10) / 10).toLocaleString('ru-RU') + ' %'
    : fmtNum(value) + ' ₽';
}

function fmtDiff(diff, metric) {
  var n = metric.unit === '%' ? (Math.round(diff * 10) / 10) : Math.round(diff);
  return '(+' + n.toLocaleString('ru-RU') + ')';
}

function renderRatings(rows, metric) {
  var listEl = document.getElementById('ratings-list');
  if (!rows.length) {
    listEl.innerHTML = '<div style="text-align:center;opacity:.6;padding:20px 0;font-size:13px;">Нет данных</div>';
    return;
  }
  listEl.innerHTML = rows.map(function(r, i) {
    var valStr = fmtMetricValue(r.value, metric);
    var diffHtml = '';
    if (i < rows.length - 1) {
      diffHtml = ' <span style="opacity:.55; font-weight:600;">' + fmtDiff(r.value - rows[i + 1].value, metric) + '</span>';
    }
    var rs = RANK_STYLES[i] || RANK_DEFAULT;
    var borderStyle = i < rows.length - 1 ? 'border-bottom:1px solid rgba(255,255,255,.12);' : '';
    return '<div style="display:flex; align-items:center; gap:12px; padding:8px 0; ' + borderStyle + '">' +
      '<div style="width:26px; height:26px; flex-shrink:0; border-radius:50%; background:' + rs.badge + '; color:' + rs.badgeColor + '; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;">' + (i + 1) + '</div>' +
      '<div style="flex:1; font-size:13px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + r.name + '</div>' +
      '<div style="text-align:right; font-size:13px; font-weight:700; color:#fff; white-space:nowrap;">' + valStr + diffHtml + '</div>' +
    '</div>';
  }).join('');
}

function loadRatings() {
  updateTitle();
  var dateFrom, dateTo;
  if (currentPeriod === 'day') {
    dateFrom = dateTo = fmtDate(dayDate);
  } else {
    var y = monthDate.getFullYear(), m = monthDate.getMonth();
    var today = new Date();
    dateFrom = y + '-' + pad2(m + 1) + '-01';
    dateTo = isSameMonth(monthDate, today) ? fmtDate(today) : (y + '-' + pad2(m + 1) + '-' + pad2(new Date(y, m + 1, 0).getDate()));
  }

  document.getElementById('ratings-list').innerHTML =
    '<div style="text-align:center;opacity:.6;padding:20px 0;font-size:13px;">Загрузка...</div>';

  fetch('/api/revenue-summary?date_from=' + dateFrom + '&date_to=' + dateTo)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) return;
      var metric = METRICS[currentMetric];
      var rows = (d.branches || []).map(function(b) {
        return { name: b.name, value: metric.get(b) };
      });
      rows.sort(function(a, b) { return b.value - a.value; });
      renderRatings(rows, metric);
    });
}

function setMetric(m) {
  currentMetric = m;
  document.querySelectorAll('.rat-metric-btn').forEach(function(b) {
    var active = b.dataset.rm === m;
    b.style.background  = active ? 'rgba(255,255,255,.25)' : 'rgba(255,255,255,.12)';
    b.style.borderColor = active ? 'rgba(255,255,255,.9)'  : 'rgba(255,255,255,.35)';
  });
  loadRatings();
}

updateNavLabels();
loadRatings();
</script>
{% endblock %}
