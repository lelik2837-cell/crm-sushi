{% extends 'base.html' %}
{% block title %}LFL — Рост выручки{% endblock %}
{% block content %}

<div class="row g-3 mb-4">

  <!-- ══ LEFT: LFL card ══ -->
  <div class="col-12 col-lg-6">
    <div id="lfl-card" style="background:linear-gradient(135deg,#16a34a 0%,#0d9488 50%,#0284c7 100%); border-radius:20px; padding:28px 28px 24px; color:#fff; position:relative; display:flex; flex-direction:column;">
      <!-- Top: metric toggle + branch selector -->
      <div style="display:flex; gap:6px; margin-bottom:20px; align-items:center;">
        <button id="lfl-btn-rev" onclick="setLflMetric('revenue')"
          style="font-size:11px; padding:4px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.9); background:rgba(255,255,255,.25); color:#fff; cursor:pointer; font-weight:600; letter-spacing:.3px; transition:all .15s;">Выручка</button>
        <button id="lfl-btn-ord" onclick="setLflMetric('orders')"
          style="font-size:11px; padding:4px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,.35); background:rgba(255,255,255,.12); color:#fff; cursor:pointer; font-weight:600; letter-spacing:.3px; transition:all .15s;">Заказы</button>
        <!-- branch dropdown -->
        {% set bs_prefix = 'lfl' %}
        {% include '_dash_branch_picker.html' %}
      </div>
      <!-- Label -->
      <div id="lfl-card-title" style="font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; opacity:.7; margin-bottom:6px;">LFL — Рост выручки</div>
      <!-- Big number -->
      <div style="display:flex; align-items:baseline; gap:3px; line-height:1; margin-bottom:2px;">
        <span id="lfl-sign" style="font-size:36px; font-weight:800; letter-spacing:-1px; line-height:1.05;"></span>
        <span id="lfl-pct-val" style="font-size:52px; font-weight:800; letter-spacing:-2px; line-height:1.05;">—</span>
        <span id="lfl-pct-sym" style="font-size:28px; font-weight:700; opacity:.8; display:none;">%</span>
      </div>
      <div id="lfl-period-label" style="font-size:14px; opacity:.6; margin-bottom:18px;">к тому же периоду прошлого года</div>
      <!-- Divider -->
      <div style="border-top:1px solid rgba(255,255,255,.2); margin-bottom:14px;"></div>
      <!-- Chart -->
      <div style="position:relative; flex:1; min-height:480px;">
        <canvas id="lfl-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- ══ RIGHT: branch LFL blocks ══ -->
  <div class="col-12 col-lg-6">
    <div id="lfl-branch-header" style="display:none; font-size:10px; color:#64748b; font-weight:700; text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px;"></div>
    <div id="lfl-branches" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
  </div>

</div>

{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
var LFL_BRANCH_GROUPS = {{ branch_groups | tojson }};
window.lflBranchIds = [];
window.lflOnBranchChange = function () { loadLfl(); };
dashBpInitGroup('lfl', LFL_BRANCH_GROUPS, function (g) {
    return g.abbr === 'НК' || g.name === 'НК' || g.name.indexOf('Новокузнецк') !== -1;
});

var lflChart  = null;
var lflMetric = 'revenue';

function setLflMetric(metric) {
    lflMetric = metric;
    var isRev = metric === 'revenue';
    var btnRev = document.getElementById('lfl-btn-rev');
    var btnOrd = document.getElementById('lfl-btn-ord');
    btnRev.style.background  = isRev ? 'rgba(255,255,255,.25)' : 'rgba(255,255,255,.12)';
    btnRev.style.borderColor = isRev ? 'rgba(255,255,255,.9)'  : 'rgba(255,255,255,.35)';
    btnOrd.style.background  = isRev ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.25)';
    btnOrd.style.borderColor = isRev ? 'rgba(255,255,255,.35)' : 'rgba(255,255,255,.9)';
    document.getElementById('lfl-card-title').textContent =
        isRev ? 'LFL — Рост выручки' : 'LFL — Рост заказов';
    loadLfl();
    loadLflBranches();
}

function loadLflBranches() {
    fetch('/api/lfl-branches?metric=' + lflMetric)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            var wrap   = document.getElementById('lfl-branches');
            var header = document.getElementById('lfl-branch-header');
            if (!d.ok || !d.branches || !d.branches.length) {
                wrap.innerHTML = '';
                if (header) header.style.display = 'none';
                return;
            }
            if (header) {
                header.textContent = 'LFL по филиалам · ' + d.month_label;
                header.style.display = '';
            }
            wrap.innerHTML = d.branches.map(function(b) {
                var pct    = b.lfl_pct;
                var hasVal = pct !== null && pct !== undefined;
                var valColor, bgStyle;
                if (hasVal && pct >= 0) {
                    valColor = '#15803d';
                    bgStyle  = 'background:linear-gradient(135deg,#fff 0%,#f0fdf4 100%);border:1.5px solid #bbf7d0;';
                } else if (hasVal) {
                    valColor = '#b91c1c';
                    bgStyle  = 'background:linear-gradient(135deg,#fff 0%,#fef2f2 100%);border:1.5px solid #fecaca;';
                } else {
                    valColor = '#94a3b8';
                    bgStyle  = 'background:linear-gradient(135deg,#fff 0%,#f1f5f9 100%);border:1.5px solid #e2e8f0;';
                }
                var pctStr = hasVal ? (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%' : '—';
                return '<div style="' + bgStyle + 'border-radius:14px;padding:16px 18px;box-shadow:0 2px 10px rgba(0,0,0,.06);">' +
                    '<div style="display:flex;align-items:center;gap:5px;margin-bottom:8px;">' +
                        '<span style="font-size:9px;font-weight:700;background:#f1f5f9;border-radius:5px;padding:2px 6px;color:#64748b;letter-spacing:.4px;flex-shrink:0;">' + b.abbr + '</span>' +
                        '<span style="font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + b.name + '</span>' +
                    '</div>' +
                    '<div style="font-size:22px;font-weight:800;letter-spacing:-.5px;color:' + valColor + ';line-height:1.1;">' + pctStr + '</div>' +
                    '<div style="font-size:9px;color:#94a3b8;margin-top:4px;">' + d.month_label + '</div>' +
                '</div>';
            }).join('');
        });
}

function buildLflChart(months) {
    if (lflChart) { lflChart.destroy(); lflChart = null; }
    var canvas = document.getElementById('lfl-canvas');
    if (!canvas) return;
    // Отфильтровываем месяцы без данных — не показываем пустое место
    var filled = months.filter(function(m) { return m.lfl_pct !== null && m.lfl_pct !== undefined; });
    if (!filled.length) return;
    var data   = filled.map(function(m) { return m.lfl_pct; });
    var labels = filled.map(function(m) { return m.label; });
    var colors = data.map(function(v) {
        return v >= 0 ? 'rgba(255,255,255,0.65)' : 'rgba(255,100,100,0.75)';
    });
    var hoverColors = data.map(function(v) {
        return v >= 0 ? 'rgba(255,255,255,0.95)' : 'rgba(255,80,80,0.95)';
    });
    lflChart = new Chart(canvas, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{ data: data, backgroundColor: colors, hoverBackgroundColor: hoverColors, borderRadius: 5, borderSkipped: false }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 400 },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            var v = ctx.parsed.y;
                            return (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
                        }
                    },
                    backgroundColor: 'rgba(0,0,0,.7)', titleColor: '#fff', bodyColor: '#fff',
                }
            },
            scales: {
                x: { ticks: { color: 'rgba(255,255,255,.8)', font: { size: 10, weight: '600' } }, grid: { display: false }, border: { color: 'rgba(255,255,255,.15)' } },
                y: {
                    ticks: { color: 'rgba(255,255,255,.65)', font: { size: 10 }, callback: function(v) { return (v >= 0 ? '+' : '') + v + '%'; } },
                    grid: { color: 'rgba(255,255,255,.12)' }, border: { display: false }
                }
            }
        }
    });
}

function loadLfl() {
    var url = '/api/lfl?metric=' + lflMetric + dashBpSuffix('lfl');
    fetch(url).then(function(r) { return r.json(); }).then(function(d) {
        if (!d.ok) return;
        var months = d.months;
        buildLflChart(months);
        var cur    = months[months.length - 1];
        var signEl = document.getElementById('lfl-sign');
        var valEl  = document.getElementById('lfl-pct-val');
        var symEl  = document.getElementById('lfl-pct-sym');
        var lblEl  = document.getElementById('lfl-period-label');
        if (cur && cur.lfl_pct !== null) {
            var pct = cur.lfl_pct;
            signEl.textContent = pct >= 0 ? '+' : '−';
            valEl.textContent  = Math.abs(pct).toFixed(1);
            symEl.style.display = '';
            signEl.style.color = pct >= 0 ? '#fff' : 'rgba(255,150,150,1)';
            valEl.style.color  = pct >= 0 ? '#fff' : 'rgba(255,150,150,1)';
            lblEl.textContent  = (cur.is_current ? 'тек. месяц · ' : '') + cur.label + ' к ' + (cur.year - 1);
        } else {
            signEl.textContent = '';
            valEl.textContent  = '—';
            symEl.style.display = 'none';
            lblEl.textContent  = 'к тому же периоду прошлого года';
        }
    });
}

loadLfl();
loadLflBranches();
</script>
{% endblock %}
