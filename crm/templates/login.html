<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CRMPAPA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-wrap {
            width: 100%;
            max-width: 380px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .brand-block {
            background: #c0392b;
            padding: 32px 40px 28px;
            text-align: center;
        }
        .brand-name {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1;
        }
        .brand-name .crm  { color: #ffffff; }
        .brand-name .papa { color: #f9ca24; }
        .brand-sub {
            color: rgba(255,255,255,0.82);
            margin-top: 8px;
            font-size: 0.88rem;
            font-weight: 500;
        }
        .form-block {
            background: #ffffff;
            padding: 32px 40px 36px;
        }
        .form-label { font-weight: 600; color: #1a1a2e; }
        .form-control { border-radius: 8px; padding: 11px 14px; border: 1px solid #dee2e6; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(192,57,43,0.18); border-color: #c0392b; }
        .btn-login {
            background: #c0392b;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            letter-spacing: 0.3px;
        }
        .btn-login:hover { background: #a93226; }

        .pin-avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(192,57,43,0.1); color: #c0392b;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
        }
        .pin-dots { display: flex; justify-content: center; gap: 16px; margin: 18px 0 24px; }
        .pin-dot {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid #dee2e6; background: transparent;
            transition: background .15s, border-color .15s, transform .15s;
        }
        .pin-dot.filled { background: #c0392b; border-color: #c0392b; transform: scale(1.1); }
        .pin-shake { animation: pinShake .4s; }
        @keyframes pinShake {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-8px); }
            40%, 60% { transform: translateX(8px); }
        }
        .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; max-width: 260px; margin: 0 auto; }
        .pin-key {
            aspect-ratio: 1; border-radius: 50%; border: none; background: transparent;
            font-size: 1.6rem; font-weight: 400; color: #1a1a2e;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; transition: background .1s;
            text-decoration: none; line-height: 1.15;
        }
        .pin-key:active { background: #f1f3f5; }
        .pin-key-text { font-size: 0.72rem; font-weight: 500; color: #868e96; text-align: center; }
        .pin-key-back { color: #adb5bd; font-size: 1.3rem; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="brand-block">
        <div class="brand-name"><span class="crm">CRM</span><span class="papa">PAPA</span></div>
        <div class="brand-sub">Система управления Папасуши</div>
    </div>
    <div class="form-block">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
        {% endfor %}
        {% endwith %}
        {% if pin_mode %}
        <div class="text-center">
            <div class="pin-avatar mx-auto"><i class="bi bi-person-fill"></i></div>
            <div style="font-weight:600; margin-top:8px;">{{ pin_name }}</div>
        </div>
        <div class="pin-dots" id="loginPinDots">
            <span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span>
        </div>
        <div class="pin-keypad" id="loginPinPad">
            <button type="button" class="pin-key" data-k="1">1</button>
            <button type="button" class="pin-key" data-k="2">2</button>
            <button type="button" class="pin-key" data-k="3">3</button>
            <button type="button" class="pin-key" data-k="4">4</button>
            <button type="button" class="pin-key" data-k="5">5</button>
            <button type="button" class="pin-key" data-k="6">6</button>
            <button type="button" class="pin-key" data-k="7">7</button>
            <button type="button" class="pin-key" data-k="8">8</button>
            <button type="button" class="pin-key" data-k="9">9</button>
            <a href="{{ url_for('login', full=1) }}" class="pin-key pin-key-text">Войти<br>по паролю</a>
            <button type="button" class="pin-key" data-k="0">0</button>
            <button type="button" class="pin-key pin-key-back" data-k="back">&#9003;</button>
        </div>
        <form method="POST" action="{{ url_for('login_pin') }}" id="loginPinForm" style="display:none;">
            <input type="hidden" name="pin" id="loginPinValue">
        </form>
        {% else %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn btn-login w-100 text-white">Войти</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('forgot_password') }}" class="text-muted small">Забыли пароль?</a>
        </div>
        {% endif %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% if pin_mode %}
<script>
function initPinFlow(padId, steps, onDone) {
    var stepIdx = 0, values = [], digits = '';
    function dotsFor(i) { return document.querySelectorAll('#' + steps[i].dotsId + ' .pin-dot'); }
    function render() { dotsFor(stepIdx).forEach(function(d, i) { d.classList.toggle('filled', i < digits.length); }); }
    function showStep(i) {
        steps.forEach(function(s, idx) {
            var wrap = document.getElementById(s.wrapId);
            if (wrap) wrap.style.display = (idx === i) ? '' : 'none';
        });
    }
    function shake() {
        var wrap = document.getElementById(steps[stepIdx].wrapId) || dotsFor(stepIdx)[0].parentElement;
        if (wrap) { wrap.classList.add('pin-shake'); setTimeout(function() { wrap.classList.remove('pin-shake'); }, 400); }
    }
    function press(k) {
        if (k === 'back') { digits = digits.slice(0, -1); render(); return; }
        if (digits.length >= 4) return;
        digits += k;
        render();
        if (digits.length === 4) {
            setTimeout(function() {
                values.push(digits);
                digits = '';
                if (stepIdx < steps.length - 1) { stepIdx++; render(); showStep(stepIdx); }
                else { onDone(values, resetAll); }
            }, 150);
        }
    }
    function resetAll() {
        stepIdx = 0; values = []; digits = '';
        steps.forEach(function(s) {
            document.querySelectorAll('#' + s.dotsId + ' .pin-dot').forEach(function(d) { d.classList.remove('filled'); });
        });
        showStep(0);
    }
    document.querySelectorAll('#' + padId + ' .pin-key[data-k]').forEach(function(btn) {
        btn.addEventListener('click', function() { press(btn.dataset.k); });
    });
    document.addEventListener('keydown', function(e) {
        if (e.key >= '0' && e.key <= '9') press(e.key);
        else if (e.key === 'Backspace') press('back');
    });
    showStep(0);
    return { reset: resetAll, shake: shake };
}
initPinFlow('loginPinPad', [{dotsId: 'loginPinDots', wrapId: null}], function(values) {
    document.getElementById('loginPinValue').value = values[0];
    document.getElementById('loginPinForm').submit();
});
</script>
{% endif %}
</body>
</html>
