<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CRMPAPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0f172a;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(233,69,96,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(14,165,233,0.08) 0%, transparent 50%);
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        /* Brand block */
        .brand-block {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #e94560, #c73652);
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(233,69,96,0.35);
        }
        .brand-logo i { font-size: 26px; color: #fff; }
        .brand-name {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 8px;
        }
        .brand-name .crm  { color: #ffffff; }
        .brand-name .papa { color: #e94560; }
        .brand-sub {
            color: rgba(255,255,255,0.45);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* Card */
        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 36px 36px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* Form elements */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute;
            left: 14px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 16px;
            pointer-events: none;
        }
        .form-input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #ffffff;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.22); }
        .form-input:focus {
            border-color: rgba(233,69,96,0.6);
            background: rgba(255,255,255,0.09);
            box-shadow: 0 0 0 3px rgba(233,69,96,0.15);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #c73652);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.18s;
            box-shadow: 0 4px 16px rgba(233,69,96,0.3);
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(233,69,96,0.4);
        }
        .btn-login:active { transform: none; box-shadow: 0 2px 8px rgba(233,69,96,0.2); }

        /* Alerts */
        .login-alert {
            padding: 12px 14px;
            border-radius: 9px;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .login-alert-danger {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
        }
        .login-alert-success {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.2);
            color: #86efac;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
<div class="login-container">
    <!-- Brand -->
    <div class="brand-block">
        <div class="brand-logo"><i class="bi bi-shop"></i></div>
        <div class="brand-name"><span class="crm">CRM</span><span class="papa">PAPA</span></div>
        <div class="brand-sub">Система управления Папасуши</div>
    </div>

    <!-- Card -->
    <div class="login-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="login-alert login-alert-{{ 'danger' if cat in ('danger','error') else 'success' }}">
            <i class="bi bi-{{ 'exclamation-circle' if cat in ('danger','error') else 'check-circle' }}"></i>
            {{ msg }}
        </div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Логин</label>
                <div class="input-wrap">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" name="username" class="form-input"
                           placeholder="Введите логин" required autofocus autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <div class="input-wrap">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" name="password" class="form-input"
                           placeholder="Введите пароль" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-login">Войти в систему</button>
        </form>
    </div>

    <div class="login-footer">Папасуши &copy; {{ now().year if now else '2026' }}</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
