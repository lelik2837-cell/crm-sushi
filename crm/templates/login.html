<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CRMPAPA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-wrap {
            width: 100%;
            max-width: 380px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .brand-block {
            background: #c0392b;
            padding: 32px 40px 28px;
            text-align: center;
        }
        .brand-name {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1;
        }
        .brand-name .crm  { color: #ffffff; }
        .brand-name .papa { color: #f9ca24; }
        .brand-sub {
            color: rgba(255,255,255,0.82);
            margin-top: 8px;
            font-size: 0.88rem;
            font-weight: 500;
        }
        .form-block {
            background: #ffffff;
            padding: 32px 40px 36px;
        }
        .form-label { font-weight: 600; color: #1a1a2e; }
        .form-control { border-radius: 8px; padding: 11px 14px; border: 1px solid #dee2e6; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(192,57,43,0.18); border-color: #c0392b; }
        .btn-login {
            background: #c0392b;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            letter-spacing: 0.3px;
        }
        .btn-login:hover { background: #a93226; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="brand-block">
        <div class="brand-name"><span class="crm">CRM</span><span class="papa">PAPA</span></div>
        <div class="brand-sub">Система управления Папасуши</div>
    </div>
    <div class="form-block">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
        {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn btn-login w-100 text-white">Войти</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
