<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CRM Суши</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .brand-wrap { text-align: center; margin-bottom: 28px; }
        .brand-box { display: inline-block; background: #e94560; color: #fff; font-size: 1.7rem; font-weight: 800; letter-spacing: 1px; padding: 10px 28px; clip-path: polygon(8px 0%, calc(100% - 8px) 0%, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0% calc(100% - 8px), 0% 8px); }
        .brand-sub { color: #6c757d; text-align: center; margin-top: 10px; margin-bottom: 24px; font-size: 0.95rem; }
        .btn-login { background: #e94560; border: none; padding: 12px; font-size: 1rem; font-weight: 600; border-radius: 10px; }
        .btn-login:hover { background: #c73652; }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-wrap">
        <div class="brand-box">ПАПАСУШИ.IS</div>
        <div class="brand-sub">Система управления доставкой</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endwith %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-semibold">Логин</label>
            <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Пароль</label>
            <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100 text-white">Войти</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
