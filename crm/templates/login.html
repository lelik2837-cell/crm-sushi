<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CRMPAPA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .login-card { background: #c0392b; border-radius: 16px; padding: 40px 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
        .brand-wrap { text-align: center; margin-bottom: 32px; }
        .brand-name { font-size: 2.6rem; font-weight: 900; letter-spacing: 2px; line-height: 1; }
        .brand-name .crm { color: #ffffff; }
        .brand-name .papa { color: #f9ca24; }
        .brand-sub { color: rgba(255,255,255,0.75); margin-top: 8px; font-size: 0.9rem; }
        .form-label { color: #fff; font-weight: 600; }
        .form-control { border-radius: 10px; padding: 12px; border: none; background: rgba(255,255,255,0.15); color: #fff; }
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .form-control:focus { background: rgba(255,255,255,0.22); color: #fff; box-shadow: 0 0 0 3px rgba(249,202,36,0.35); border: none; }
        .alert { border-radius: 10px; }
        .btn-login { background: #922b21; border: none; padding: 13px; font-size: 1rem; font-weight: 700; border-radius: 10px; letter-spacing: 0.5px; }
        .btn-login:hover { background: #7b241c; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-wrap">
        <div class="brand-name"><span class="crm">crm</span><span class="papa">papa</span></div>
        <div class="brand-sub">Система управления Папасуши</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endwith %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-semibold">Логин</label>
            <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Пароль</label>
            <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100 text-white">Войти</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
